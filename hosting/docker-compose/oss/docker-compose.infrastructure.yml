services:
    postgres:
        image: postgres:17
        volumes:
            - postgres-data:/var/lib/postgresql/data/
            - ./../../../api/oss/databases/postgres/init-db-oss.sql:/docker-entrypoint-initdb.d/init-db.sql
        env_file:
            - ${ENV_FILE:-./.env.oss.dev}
        environment:
            POSTGRES_USER: ${POSTGRES_USER:-username}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
        networks:
            - agenta-network
        ports:
            - "${POSTGRES_PORT:-5432}:5432"
        restart: always
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U username -d agenta101_core"]
            interval: 10s
            timeout: 5s
            retries: 5

    redis-volatile:
        image: redis:8
        command: >
            redis-server
            --appendonly no
            --save ""
            --maxmemory 512mb
            --maxmemory-policy volatile-lru
            --port 6379
        volumes:
            - redis-volatile-data:/data
        networks:
            - agenta-network
        ports:
            - "6379:6379"
        restart: always
        healthcheck:
            test: ["CMD", "redis-cli", "-p", "6379", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 5s

    redis-durable:
        image: redis:8
        command: >
            redis-server
            --appendonly yes
            --appendfsync no
            --save ""
            --maxmemory 512mb
            --maxmemory-policy noeviction
            --port 6381
        volumes:
            - redis-durable-data:/data
        networks:
            - agenta-network
        ports:
            - "6381:6381"
        restart: always
        healthcheck:
            test: ["CMD", "redis-cli", "-p", "6381", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 5s

    supertokens:
        image: supertokens/supertokens-postgresql:latest
        env_file:
            - ${ENV_FILE:-./.env.oss.dev}
        environment:
            POSTGRESQL_CONNECTION_URI: ${POSTGRES_URI_SUPERTOKENS:-postgresql://username:password@postgres:5432/agenta_oss_supertokens}
        networks:
            - agenta-network
        ports:
            - "3567:3567"
        depends_on:
            postgres:
                condition: service_healthy
        restart: always
        healthcheck:
            test: >
                bash -c 'exec 3<>/dev/tcp/127.0.0.1/3567 && echo -e "GET /hello HTTP/1.1\r\nhost: 127.0.0.1:3567\r\nConnection: close\r\n\r\n" >&3 && cat <&3 | grep "Hello"'
            interval: 10s
            timeout: 5s
            retries: 5

    traefik:
        image: traefik:2
        command:
            - --api.dashboard=true
            - --api.insecure=true
            - --providers.docker
            - --providers.docker.constraints=Label(`com.docker.compose.project`,`${COMPOSE_PROJECT_NAME:-agenta-oss-dev}`)
            - --entrypoints.web.address=:80
            - --ping=true
            - --accesslog=true
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock
        networks:
            - agenta-network
        ports:
            - "${TRAEFIK_PORT:-80}:80"
            - "${TRAEFIK_UI_PORT:-8080}:8080"
        restart: always
        healthcheck:
            test: ["CMD", "traefik", "healthcheck", "--ping"]
            interval: 10s
            timeout: 5s
            retries: 3
            start_period: 10s

networks:
    agenta-network:

volumes:
    postgres-data:
    redis-volatile-data:
    redis-durable-data: